    <!-- Firebase -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getAuth, signOut } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
        import { getDatabase, ref, onValue, get, push, set, update, remove } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js';

        const firebaseConfig = {
            apiKey: "AIzaSyCTPmreHwKVTyb97nbXplAqw-XMn7PkOdg",
            authDomain: "mcg-residencial360.firebaseapp.com",
            databaseURL: "https://mcg-residencial360-default-rtdb.firebaseio.com",
            projectId: "mcg-residencial360",
            storageBucket: "mcg-residencial360.firebasestorage.app",
            messagingSenderId: "618173148696",
            appId: "1:618173148696:web:74ae92ab9a4c5565165d6d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // Verificar autenticación
        auth.onAuthStateChanged((user) => {
            if (!user) {
                window.location.href = 'index.html';
            } else {
                const userInfo = JSON.parse(localStorage.getItem('mcgUser'));
                document.getElementById('nombreUsuario').textContent = userInfo?.nombre || user.email;

                // Cargar contadores dinámicos
                cargarContadores();
                cargarAlertasVencimientos();
            }
        });
        

        
        const NOMBRES_EDIFICIOS = {
            
            
            
            
            
        };

        // CARGAR CONTADORES DINÁMICOS
        function cargarContadores() {
            // Contar edificios
            const edificiosRef = ref(db, 'edificios');
            onValue(edificiosRef, (snapshot) => {
                const total = snapshot.exists() ? Object.keys(snapshot.val()).length : 0;
                document.getElementById('totalConjunto').textContent = total;
            });


                        // Contar facturas pendientes y calcular saldo por pagar
            const cuentasRef = ref(db, 'cuentas_por_pagar');
            onValue(cuentasRef, (snapshot) => {
                let facturasPendientes = 0;
                let saldoTotal = 0;

                if (snapshot.exists()) {
                    // Nivel 1: edificios
                    snapshot.forEach((edificioSnap) => {
                        // Nivel 2: facturas individuales
                        edificioSnap.forEach((facturaSnap) => {
                            const cuenta = facturaSnap.val();
                            if (cuenta.estado !== 'pagada' && cuenta.estado !== 'Pagada') {
                                facturasPendientes++;
                                saldoTotal += parseFloat(cuenta.valorNeto || cuenta.restoAPagar || 0);
                            }
                        });
                    });
                }

                document.getElementById('facturasPendientes').textContent = facturasPendientes;
                document.getElementById('saldoPorPagar').textContent =
                    '$' + saldoTotal.toLocaleString('es-CO', {minimumFractionDigits: 0, maximumFractionDigits: 0});

                // Desglose por edificio
                const resumenEdificios = {};
                if (snapshot.exists()) {
                    snapshot.forEach((edificioSnap) => {
                        const eId = edificioSnap.key;
                        let pendientes = 0, saldo = 0, vencidas = 0;
                        const hoy = new Date(); hoy.setHours(0,0,0,0);
                        edificioSnap.forEach((facturaSnap) => {
                            const c = facturaSnap.val();
                            if (c.estado !== 'pagada' && c.estado !== 'Pagada') {
                                pendientes++;
                                saldo += parseFloat(c.valorNeto || c.restoAPagar || 0);
                                if (c.fechaVencimiento && new Date(c.fechaVencimiento + 'T00:00:00') < hoy) vencidas++;
                            }
                        });
                        if (pendientes > 0) resumenEdificios[eId] = { pendientes, saldo, vencidas };
                    });
                }
                const lista = document.getElementById('edificios-facturas-lista');
                if (Object.keys(resumenEdificios).length === 0) {
                    lista.innerHTML = '<p style="color:#2e7d32;font-weight:600;">✅ Sin facturas pendientes</p>';
                } else {
                    lista.innerHTML = Object.entries(resumenEdificios).map(([eId, r]) => {
                        const tieneVencidas = r.vencidas > 0;
                        const bg = tieneVencidas ? '#fff5f5' : '#f8fbff';
                        const border = tieneVencidas ? '#e53935' : '#1976d2';
                        const icono = tieneVencidas ? '🔴' : '🟡';
                        return `<div style="background:${bg};border:2px solid ${border};border-radius:12px;padding:16px;">
                            <div style="font-weight:700;font-size:1.05em;margin-bottom:8px;">${icono} ${NOMBRES_EDIFICIOS[eId] || eId}</div>
                            <div style="color:#555;font-size:0.95em;">📄 ${r.pendientes} factura${r.pendientes>1?'s':''} pendiente${r.pendientes>1?'s':''}</div>
                            ${r.vencidas > 0 ? `<div style="color:#e53935;font-size:0.9em;font-weight:600;">⚠️ ${r.vencidas} vencida${r.vencidas>1?'s':''}</div>` : ''}
                            <div style="font-size:1.15em;font-weight:700;color:${border};margin-top:8px;">$${r.saldo.toLocaleString('es-CO',{minimumFractionDigits:0,maximumFractionDigits:0})}</div>
                            <a href="cuentas-por-pagar.html" style="display:inline-block;margin-top:8px;font-size:0.85em;color:${border};text-decoration:none;">Ver facturas →</a>
                        </div>`;
                    }).join('');
                }
            });
        }
        // ALERTAS DE VENCIMIENTO DE PÓLIZA Y REPRESENTACIÓN
        function cargarAlertasVencimientos() {
            const edificiosRef = ref(db, 'edificios');
            get(edificiosRef).then((snapshot) => {
                const lista = document.getElementById('alertas-lista');
                const cargando = document.getElementById('alertas-cargando');
                if (cargando) cargando.remove();
                if (!snapshot.exists()) {
                    lista.innerHTML = '<p style="color:#888;font-style:italic;">No hay edificios registrados.</p>';
                    return;
                }
                const hoy = new Date();
                hoy.setHours(0,0,0,0);
                const alertas = [];
                snapshot.forEach((child) => {
                    const ed = child.val();
                    const nombre = ed.nombre || child.key;
                    [
                        { campo: 'polizaVence', label: 'Póliza de Seguros' },
                        { campo: 'representacionVence', label: 'Representación Legal' }
                    ].forEach(({ campo, label }) => {
                        if (!ed[campo]) return;
                        const fecha = new Date(ed[campo] + 'T00:00:00');
                        const dias = Math.round((fecha - hoy) / 86400000);
                        if (dias > 90) return; // solo mostrar si vence en 90 días o menos
                        let color, bg, icono;
                        if (dias < 0)       { color = '#c62828'; bg = '#ffebee'; icono = '🔴'; }
                        else if (dias <= 30) { color = '#e65100'; bg = '#fff3e0'; icono = '🟠'; }
                        else                { color = '#f57f17'; bg = '#fffde7'; icono = '🟡'; }
                        const texto = dias < 0
                            ? `VENCIDA hace ${Math.abs(dias)} día(s)`
                            : dias === 0 ? 'Vence HOY'
                            : `Vence en ${dias} día(s) — ${fecha.toLocaleDateString('es-CO')}`;
                        alertas.push({ nombre, label, icono, color, bg, texto, dias });
                    });
                });
                if (alertas.length === 0) {
                    lista.innerHTML = '<p style="color:#2e7d32;font-weight:600;">✅ Sin vencimientos próximos en los próximos 90 días.</p>';
                    return;
                }
                alertas.sort((a,b) => a.dias - b.dias);
                lista.innerHTML = alertas.map(a => `
                    <div style="background:${a.bg};border:2px solid ${a.color};border-radius:10px;padding:14px 18px;">
                        <div style="font-size:1.1em;font-weight:700;color:${a.color};margin-bottom:4px;">${a.icono} ${a.nombre}</div>
                        <div style="font-weight:600;color:#555;margin-bottom:3px;">${a.label}</div>
                        <div style="color:${a.color};font-weight:600;">${a.texto}</div>
                    </div>`).join('');
            }).catch(err => {
                console.error('Error cargando alertas:', err);
            });
        }

        // Cerrar sesión
        window.cerrarSesion = function() {
            signOut(auth).then(() => {
                localStorage.removeItem('mcgUser');
                window.location.href = 'index.html';
            });
        };

        
        
    </script>

    <script>
        // NAVEGACIÓN
        function mostrarSeccion(seccion) {
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            if (seccion === 'dashboard') {
                document.getElementById('dashboard-section').style.display = 'block';
                document.querySelectorAll('.nav-btn')[0].classList.add('active');
            }
        }
    </script>
